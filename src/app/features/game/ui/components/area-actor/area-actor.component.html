<div [style.width]="width" [style.height]="width" [style.z-index]="position.z + zOffset"
  class="area-actor group facing-{{actor.facing}} anim-status-{{actor.animStatus.toLocaleLowerCase()}}"
  [style.bottom]="position.bottom" [style.filter]="'brightness(' + (lightLevel * 100) + '%)'"
  [style.left]="position.left" id="area-actor-{{ actor.id }}">
  @if(healthPercent > 0) {
  <div
    class="absolute top-[30%] left-[20%] w-[60%] h-1 pointer-events-none flex bg-gray-800/50 ring-2 ring-gray-800/50">
    <div class="absolute top-0 left-0 h-1 bg-red-500" [attr.style]="`width: ${healthPercent}%`"></div>
  </div>
  }
  @if (actor.actorType === 'slime_green') {
  <app-svg-actor-slime-green [isActorSelected]="isActorSelected" [isClickable]="isClickable && !isLockedOut"
    [status]="actor.animStatus" [relativePlayerXPos]="relativePlayerXPos" />

  } @if (isActorSelected) {
  <div
    class="absolute top-[45%] left-[25%] w-[50%] h-[40%] bg-transparent rounded-full z-index-[100] border-4 border-primary border-dashed ring-2 ring-offset-2 ring-offset-primaryDarker ring-primaryDark"
    aria-hidden="true">
  </div>
  }
  @if (isClickable && !isLockedOut && healthPercent > 0) {
  <button role="button" type="button" [attr.aria-label]="ariaLabel" (click)="handleClick()"
    [disabled]="!isClickable && !isEditorMode"
    class="absolute top-[45%] left-[25%] w-[50%] h-[40%] cursor-pointer pointer-events-auto rounded-full outline-none ring-0 ring-primaryDark focus:ring-4 focus:ring-primaryDarker group-hover:ring-4 transition-all"></button>
  }
</div>
