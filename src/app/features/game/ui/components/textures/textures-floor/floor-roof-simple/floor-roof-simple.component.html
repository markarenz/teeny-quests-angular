<svg [attr.viewBox]="floorProps.svg.viewBox" version="1.1" xmlns="http://www.w3.org/2000/svg"
  xmlns:svg="http://www.w3.org/2000/svg" [attr.style]="floorProps.svg.style">
  [attr.style]="'position: absolute; ' + (floorProps.isFlat ? 'top: -10%; left: -75%; width: 250%' : 'top: -50%; left:
  0; width: 100%')">
  <defs>
    <pattern [id]="floorProps.textureId" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <g class="roof-simple-group">
        <path class="roof1" d="m 0,25 50,-15 3e-6,40 z" id="path22" />
        <path class="roof2" d="M 50.000003,0 100,25 50,10 Z" id="path24" />
        <path class="roof3" d="M 50.000003,50 50,10 100,25 Z" id="path12" />
        <path class="roof4" d="m 0,25 50,-15 3e-6,-10 z" id="path13" />
      </g>
    </pattern>
  </defs>
  <polygon (click)="handleClick()" stroke="#444" [attr.stroke-width]="floorProps.poly.strokeWidth"
    [attr.class]="floorProps.poly.class" [attr.points]="floorProps.poly.points" [attr.fill]="floorProps.poly.fill" />
</svg>
